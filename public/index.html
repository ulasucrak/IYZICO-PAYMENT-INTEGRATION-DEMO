<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Digital Consulting</title>
</head>
<body>
    <div class="card">
        <h1>Digital Consulting Package</h1>
        <p class="fiyat">₺10,00</p>
        <p>One hour of one-on-one consulting service.</p>
        <form id="payment-form">

            <label>First Name</label>
            <input id="name" type="text" placeholder="Your first name">
          
            <label>Last Name</label>
            <input id="surname" type="text" placeholder="Your last name">
          
            <label>Email</label>
            <input id="email" type="email" placeholder="mail@example.com">
          
            <label>Card Number</label>
            <input id="cardNumber" type="text" placeholder="5528 7900 0000 0008">
          
            <label>Expiry Month</label>
            <input id="expireMonth" type="text" placeholder="12">
          
            <label>Expiry Year</label>
            <input id="expireYear" type="text" placeholder="2030">
          
            <label>CVC</label>
            <input id="cvc" type="text" placeholder="123">
          
            <button type="button" onclick="makePayment()">Buy Now</button>
          
            <p id="error"></p>
          
          </form>
      </div>
      <script>
        async function makePayment() {
          const data = {
            name: document.getElementById('name').value,
            surname: document.getElementById('surname').value,
            email: document.getElementById('email').value,
            cardNumber: document.getElementById('cardNumber').value,
            expireMonth: document.getElementById('expireMonth').value,
            expireYear: document.getElementById('expireYear').value,
            cvc: document.getElementById('cvc').value,
          };
      
          const response = await fetch('/api/create-payment', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data),
          });
      
          const result = await response.json();
      
          if (result.success) {
            window.location.href = '/result.html';
          } else {
            document.getElementById('error').textContent = result.error;
          }
        }
      </script>
</body>
</html>
